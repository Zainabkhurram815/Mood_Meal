<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoodMeal - Khana Mood ke Hisaab Se</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --card: white;
            --text: #333;
        }
        body.dark {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --text: #f5f5f5;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px 20px;
            transition: 0.5s;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            max-width: 800px;
            margin: 0 auto 20px;
        }
        #darkBtn {
            font-size: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .mood-buttons button {
            font-size: 18px;
            padding: 15px 25px;
            margin: 8px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mood-buttons button:hover {
            transform: scale(1.05);
        }
        .happy { background: #FFF9C4; color: #333; }
        .stressed { background: #FFCDD2; color: #333; }
        .lazy { background: #C8E6C9; color: #333; }
        .sick { background: #BBDEFB; color: #333; }

        #recipes {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        /* Flip Card CSS */
        .recipe-card {
            background: transparent;
            width: 280px;
            height: 200px;
            perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .recipe-card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            padding: 20px;
            box-sizing: border-box;
            background: var(--card);
            color: var(--text);
        }
        .card-back {
            transform: rotateY(180deg);
            overflow-y: auto;
        }

        /* Mood History */
        #history {
            margin-top: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        #history h3 {
            border-bottom: 2px solid var(--text);
            padding-bottom: 5px;
            display: inline-block;
        }
        .history-item {
            background: var(--card);
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            font-size: 14px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div></div>
        <button id="darkBtn" onclick="toggleDark()">🌙</button>
    </div>

    <h1>MoodMeal 🍜</h1>
    <p>Aaj tumhara mood kya hai?</p>

    <div class="mood-buttons">
        <button class="happy" onclick="showRecipes('happy')">😊 Happy</button>
        <button class="stressed" onclick="showRecipes('stressed')">😰 Stressed</button>
        <button class="lazy" onclick="showRecipes('lazy')">😴 Lazy</button>
        <button class="sick" onclick="showRecipes('sick')">🤢 Sick</button>
    </div>

    <div id="recipes">
        <p>Pehle apna mood select karo 👆</p>
    </div>

    <div id="history">
        <h3>Last 7 Mood History</h3>
        <div id="historyList"></div>
    </div>

    <script>
        const recipes = {
            happy: [
                {name: "Chocolate Cake", time: "30 min", ingredients: "Maida, Cocoa, Sugar, Egg, Oil,baking powder", recipe: "beat eggs with sugar untill it becomes fluffy then add dry ingredients and fold the mixture with light hands→ 180°C pe 25 min bake → Frosting lagao → Ready!"},
                {name: "Biryani", time: "45 min", ingredients: "Chawal, Chicken, Dahi,biryani Masala, Pyaaz", recipe: "Chicken ko achi trh sary spices dal ky bhun lo or rice ko 70% boil krlo then layer it phly rice ki ek layer phir chicken mixture ki do it 3 time→ Dam 15 min → Serve with raita"},
                {name: "Ice Cream", time: "5 min", ingredients: "Doodh, Cream, Sugar, Vanilla", recipe: "Sab blend karo → Freezer 4 ghante → Scoop karke khao"}
            ],
            stressed: [
                {name: "5 Min Maggi", time: "5 min", ingredients: "noodle, Paani, Masala", recipe: "Paani ubalao → noodle + Masala dalo → 2 min pakao"},
                {name: "cold coffee", time: "3 min", ingredients: "coffee powder, Doodh, Cheeni, water", recipe: "coffee powder mai sugar or thora sa water add krky achi tarah beat krien jb tk fluffy na hojaye → thanda doodh add kro → Cheeni or ice cubes add krien →  add a scope of your favorite ice cream and enjoy!"},
                {name: "fruit shake", time: "2 min", ingredients: "fruit(mango,apple,banana), milk,ice , suger", recipe: "sb kuch achy se blend krlo"},
            ],
            lazy: [
                {name: "egg bread", time: "4 min", ingredients: "egg, bread", recipe: "egg fry kro or usky upar salt or black pepper sprinkle kro → bread toast kro"},
                {name: "Bread Jam", time: "2 min", ingredients: "Bread, Jam, Makhan", recipe: "Bread toast → Makhan lagao → Jam upar se"},
                {name: "Cereal + Milk", time: "1 min", ingredients: "Cornflakes, Doodh, Sugar", recipe: "Bowl me cereal dalo → Doodh dalo → Spoon chalao"}
            ],
            sick: [
                {name: "Chicken Soup", time: "20 min", ingredients: "Chicken, Paani, Namak, Kali Mirch, corn flour, egg", recipe: "Chicken ubalao 15 min → chicken stock mai Namak mirch dalo chicken dalo then cornflour pani mai mix krky wo add kro (stire it continully) phir ek egg beat kry dalo → Garam garam piyo"},
                {name: "Kehwa", time: "5 min", ingredients: "Paani, Elaichi, Adrak, Shehad", recipe: "Paani ubalao → Elaichi adrak dalo → Shehad mix karo"},
                {name: "Khichdi", time: "15 min", ingredients: "Daal, Chawal, Haldi, Namak", recipe: "Sab 1 sath ubalao → Ghee ka tadka lagao → Easy digest"}
            ]
        };

        function showRecipes(mood) {
            // 1. Mood history save karo
            saveMoodHistory(mood);
            
            // 2. Recipes show karo with flip
            let html = `<h2>${mood.toUpperCase()} Mode Activated! ✨</h2>`;
            
            recipes[mood].forEach((recipe) => {
                html += `
                    <div class="recipe-card" onclick="this.classList.toggle('flipped')">
                        <div class="card-inner">
                            <div class="card-front">
                                <h3>${recipe.name}</h3>
                                <p>⏱️ Time: ${recipe.time}</p>
                                <p style="font-size:12px; color:gray; margin-top:30px">Click for recipe 👇</p>
                            </div>
                            <div class="card-back">
                                <h4>📝 Ingredients:</h4>
                                <p>${recipe.ingredients}</p>
                                <h4>👩‍🍳 Recipe:</h4>
                                <p style="font-size:13px; line-height:1.5">${recipe.recipe}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('recipes').innerHTML = html;
        }

        function saveMoodHistory(mood) {
            let history = JSON.parse(localStorage.getItem('moodHistory')) || [];
            let time = new Date().toLocaleString();
            
            history.unshift({mood: mood, time: time});
            
            // Sirf last 7 rakho
            if(history.length > 7) {
                history = history.slice(0, 7);
            }
            
            localStorage.setItem('moodHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            let history = JSON.parse(localStorage.getItem('moodHistory')) || [];
            let html = '';
            
            if(history.length === 0) {
                html = '<p style="color:gray">Abhi koi history nahi</p>';
            } else {
                history.forEach(item => {
                    let emoji = {happy:'😊', stressed:'😰', lazy:'😴', sick:'🤢'}[item.mood];
                    html += `<div class="history-item">${emoji} ${item.mood.toUpperCase()} - ${item.time}</div>`;
                });
            }
            
            document.getElementById('historyList').innerHTML = html;
        }

        function toggleDark() {
            document.body.classList.toggle('dark');
            let btn = document.getElementById('darkBtn');
            btn.innerText = document.body.classList.contains('dark') ? '☀️' : '🌙';
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        }

        // Page load pe dark mode aur history load karo
        window.onload = function() {
            if(localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark');
                document.getElementById('darkBtn').innerText = '☀️';
            }
            displayHistory();
        }
    </script>

</body>
</html
